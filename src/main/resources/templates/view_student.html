<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View Student</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4">Student Details</h2>
    <div class="card">
        <div class="card-body">
            <p><strong>ID:</strong> <span th:text="${student.id}"></span></p>
            <p><strong>First Name:</strong> <span th:text="${student.firstName}"></span></p>
            <p><strong>Last Name:</strong> <span th:text="${student.lastName}"></span></p>
            <p><strong>Email:</strong> <span th:text="${student.email}"></span></p>
        </div>
    </div>

    <div class="mt-3">
        <a href="/students" class="btn btn-secondary">Back to List</a>
        <a th:href="@{'/students/edit/' + ${student.id}}" class="btn btn-primary">Update</a>
		<a th:href="@{/students/{id}(id=${student.id})}" class="btn btn-danger" 		onclick="return confirm('Are you sure you want to delete this student?');">Delete</a>
    </div>
</div>
</body>
</html>
